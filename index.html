<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDocs Ultimate — HTML5 & CSS Complete Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #090b10;
            --bg-base: #0d1017;
            --bg-surface: #131720;
            --bg-card: #1e2535;
            --text-primary: #e6edf3;
            --text-muted: #8b949e;
            --accent-blue: #4d8ef0;
            --accent-cyan: #3ecfcf;
            --accent-violet: #9b6dff;
            --accent-amber: #f0b84d;
            --accent-rose: #f06090;
            --accent-green: #4dcf8e;
            --border-color: #30363d;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-void: #ffffff;
                --bg-base: #f6f8fa;
                --bg-surface: #eaeef2;
                --bg-card: #ffffff;
                --text-primary: #24292f;
                --text-muted: #57606a;
                --border-color: #d0d7de;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { font-size: 16px; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            align-items: center;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .nav-btn:hover {
            background: var(--bg-surface);
            color: var(--accent-cyan);
        }

        .nav-btn.active {
            background: rgba(77, 142, 240, 0.2);
            color: var(--accent-blue);
            border-bottom: 2px solid var(--accent-blue);
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.5rem;
            margin-left: auto;
        }

        /* ===== SIDEBAR ===== */
        aside {
            position: fixed;
            left: 0;
            top: 60px;
            width: 280px;
            height: calc(100vh - 60px);
            background: var(--bg-base);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px 0;
            z-index: 99;
        }

        .nav-section {
            margin-bottom: 10px;
        }

        .nav-section-title {
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-surface);
            color: var(--accent-cyan);
        }

        .nav-item.active {
            background: rgba(77, 142, 240, 0.1);
            color: var(--accent-blue);
            border-left-color: var(--accent-blue);
        }

        .nav-item-tag {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            margin-left: 280px;
            margin-top: 60px;
            padding: 40px;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section-header {
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* ===== PROPERTY CARD ===== */
        .property-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            scroll-margin-top: 100px;
        }

        .property-name {
            font-family: 'Fira Code', monospace;
            font-size: 1.4rem;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .property-type {
            display: inline-block;
            background: rgba(62, 207, 207, 0.2);
            color: var(--accent-cyan);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .property-description {
            color: var(--text-muted);
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .subsection {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .subsection:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .subsection-title {
            font-weight: 600;
            color: var(--accent-blue);
            font-size: 1rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        /* ===== PARAMETERS TABLE ===== */
        .params-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .params-table thead {
            background: rgba(77, 142, 240, 0.1);
        }

        .params-table th {
            text-align: left;
            padding: 12px;
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .params-table td {
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
        }

        .params-table tbody tr:hover {
            background: rgba(62, 207, 207, 0.08);
        }

        .param-name {
            font-family: 'Fira Code', monospace;
            color: var(--accent-violet);
            font-weight: 600;
        }

        .param-type {
            font-family: 'Fira Code', monospace;
            color: var(--accent-amber);
            font-size: 0.85rem;
        }

        /* ===== CODE BLOCK ===== */
        .code-wrap {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            margin: 12px 0;
        }

        .code-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .code-header-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #28c940; }

        .code-copy-btn {
            background: var(--accent-blue);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .code-copy-btn:hover {
            background: var(--accent-cyan);
            transform: scale(1.05);
        }

        .code-block {
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            color: #9ecbff;
            line-height: 1.5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            main {
                margin-left: 0;
                padding: 30px 20px;
            }

            aside {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            aside.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
            }

            header {
                flex-wrap: wrap;
            }

            .search-box {
                max-width: 200px;
                order: 3;
                flex-basis: 100%;
            }
        }

        @media (max-width: 640px) {
            html { font-size: 14px; }

            header {
                padding: 10px;
                gap: 10px;
            }

            .logo {
                font-size: 0.95rem;
            }

            .nav-tabs {
                padding-left: 0;
                border-left: none;
            }

            .nav-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            main {
                padding: 20px 15px;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .property-card {
                padding: 16px;
            }

            .params-table {
                font-size: 0.8rem;
            }

            .params-table th, .params-table td {
                padding: 8px;
            }

            .code-block {
                font-size: 0.75rem;
                padding: 12px;
            }

            aside {
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        .badge {
            display: inline-block;
            background: rgba(155, 109, 255, 0.2);
            color: var(--accent-violet);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
        }

        .example-title {
            font-weight: 600;
            color: var(--accent-violet);
            font-size: 0.9rem;
            margin-bottom: 8px;
            margin-top: 12px;
        }

        .stats-box {
            background: linear-gradient(135deg, rgba(77, 142, 240, 0.1), rgba(62, 207, 207, 0.1));
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="logo">📚 DevDocs</div>
            <div class="nav-tabs">
                <button class="nav-btn active" id="htmlBtn" onclick="switchPage('html')">📄 HTML</button>
                <button class="nav-btn" id="cssBtn" onclick="switchPage('css')">🎨 CSS</button>
            </div>
        </div>
        <input type="text" class="search-box" id="searchInput" placeholder="Buscar...">
        <button class="menu-toggle" id="menuToggle">☰</button>
    </header>

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div class="nav-section" id="sidebarSection"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main>
        <!-- HTML PAGE -->
        <div id="html" class="content-section active">
            <div class="section-header">
                <div class="section-title">HTML5 Tags Reference</div>
                <div class="section-subtitle">Documentação completa de todas as tags HTML5 com exemplos práticos</div>
            </div>

            <div class="stats-box">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number">120+</div>
                        <div class="stat-label">Tags</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">600+</div>
                        <div class="stat-label">Atributos</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">250+</div>
                        <div class="stat-label">Exemplos</div>
                    </div>
                </div>
            </div>

            <div id="htmlContent"></div>
        </div>

        <!-- CSS PAGE -->
        <div id="css" class="content-section">
            <div class="section-header">
                <div class="section-title">CSS Properties Reference</div>
                <div class="section-subtitle">Documentação completa de todas as propriedades CSS3 com parâmetros detalhados</div>
            </div>

            <div class="stats-box">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number">150+</div>
                        <div class="stat-label">Properties</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">800+</div>
                        <div class="stat-label">Valores</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">400+</div>
                        <div class="stat-label">Exemplos</div>
                    </div>
                </div>
            </div>

            <div id="cssContent"></div>
        </div>
    </main>

    <script>
        // HTML TAGS DATABASE
        const htmlTags = [
            {
                name: 'a',
                type: 'Inline',
                description: 'Cria um hiperlink para outras páginas, arquivos ou âncoras. Elemento mais importante para navegação web.',
                attributes: [
                    { name: 'href', type: 'URL', desc: 'Endereço do link (obrigatório)' },
                    { name: 'target', type: 'string', desc: '_blank (nova aba), _self (mesma aba), _parent, _top' },
                    { name: 'rel', type: 'string', desc: 'noopener, noreferrer, nofollow, external, alternate' },
                    { name: 'title', type: 'string', desc: 'Texto ao passar mouse' },
                    { name: 'download', type: 'string', desc: 'Força download do arquivo' },
                    { name: 'hreflang', type: 'language', desc: 'Idioma do documento linked' }
                ],
                examples: [
                    { title: 'Link Simples', code: '<a href="https://example.com">Clique aqui</a>' },
                    { title: 'Link em Nova Aba', code: '<a href="https://example.com" target="_blank" rel="noopener noreferrer">\n  Abre em Nova Aba\n</a>' },
                    { title: 'Link com Download', code: '<a href="documento.pdf" download="meu-documento">Baixar PDF</a>' },
                    { title: 'Âncora Interna', code: '<a href="#secao2">Ir para Seção 2</a>' }
                ]
            },
            {
                name: 'button',
                type: 'Inline-Block',
                description: 'Cria um botão clicável interativo. Mais semântico e acessível que usar divs.',
                attributes: [
                    { name: 'type', type: 'string', desc: 'button, submit, reset' },
                    { name: 'disabled', type: 'boolean', desc: 'Desativa o botão' },
                    { name: 'onclick', type: 'javascript', desc: 'Função ao clicar' },
                    { name: 'form', type: 'id', desc: 'Associa a um formulário' },
                    { name: 'name', type: 'string', desc: 'Nome do botão' },
                    { name: 'value', type: 'string', desc: 'Valor do botão' }
                ],
                examples: [
                    { title: 'Botão Básico', code: '<button type="button">Clique aqui</button>' },
                    { title: 'Botão Desativado', code: '<button type="button" disabled>Desativado</button>' },
                    { title: 'Botão Submit', code: '<button type="submit">Enviar Formulário</button>' }
                ]
            },
            {
                name: 'div',
                type: 'Block',
                description: 'Elemento divisor genérico. Sem semântica específica, usado para agrupamento e estilo.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe CSS' },
                    { name: 'id', type: 'string', desc: 'ID único do elemento' },
                    { name: 'style', type: 'CSS', desc: 'CSS inline' },
                    { name: 'data-*', type: 'custom', desc: 'Atributo customizado para dados' }
                ],
                examples: [
                    { title: 'Div Básica', code: '<div class="container">\n  Conteúdo aqui\n</div>' },
                    { title: 'Div com ID', code: '<div id="header">\n  Cabeçalho da página\n</div>' }
                ]
            },
            {
                name: 'header',
                type: 'Block / Sectioning',
                description: 'Representa o cabeçalho de uma seção ou página. Elemento semântico.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe CSS' },
                    { name: 'id', type: 'string', desc: 'ID único' }
                ],
                examples: [
                    { title: 'Header Semântico', code: '<header>\n  <h1>Meu Website</h1>\n  <nav>...</nav>\n</header>' }
                ]
            },
            {
                name: 'nav',
                type: 'Block / Sectioning',
                description: 'Agrupa links de navegação. Elemento semântico para menus.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe' },
                    { name: 'aria-label', type: 'string', desc: 'Label para acessibilidade' }
                ],
                examples: [
                    { title: 'Menu de Navegação', code: '<nav>\n  <ul>\n    <li><a href="/">Home</a></li>\n    <li><a href="/about">Sobre</a></li>\n  </ul>\n</nav>' }
                ]
            },
            {
                name: 'main',
                type: 'Block / Sectioning',
                description: 'Contém o conteúdo principal da página. Deve haver apenas um por página.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe' },
                    { name: 'id', type: 'string', desc: 'ID único' }
                ],
                examples: [
                    { title: 'Main Content', code: '<main>\n  <article>\n    Conteúdo principal da página\n  </article>\n</main>' }
                ]
            },
            {
                name: 'footer',
                type: 'Block / Sectioning',
                description: 'Representa o rodapé de uma seção ou página.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe' }
                ],
                examples: [
                    { title: 'Footer', code: '<footer>\n  <p>&copy; 2024 Meu Site. Todos os direitos reservados.</p>\n</footer>' }
                ]
            },
            {
                name: 'h1, h2, h3, h4, h5, h6',
                type: 'Block',
                description: 'Títulos e subtítulos. h1 é o maior, h6 é o menor. Importante para SEO.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe' },
                    { name: 'id', type: 'string', desc: 'ID (útil para âncoras)' }
                ],
                examples: [
                    { title: 'Hierarquia de Títulos', code: '<h1>Título Principal</h1>\n<h2>Subtítulo</h2>\n<h3>Seção Menor</h3>' }
                ]
            },
            {
                name: 'p',
                type: 'Block',
                description: 'Parágrafo de texto. Deve ser usado para blocos de texto corridos.',
                attributes: [
                    { name: 'class', type: 'string', desc: 'Nome da classe' }
                ],
                examples: [
                    { title: 'Parágrafo Simples', code: '<p>Este é um parágrafo com texto corrido.</p>' }
                ]
            },
            {
                name: 'ul, ol, li',
                type: 'Block',
                description: 'Listas não-ordenadas (ul) e ordenadas (ol), com itens (li).',
                attributes: [
                    { name: 'type', type: 'string', desc: 'Para ol: 1, a, A, i, I' },
                    { name: 'start', type: 'number', desc: 'Número inicial da lista' }
                ],
                examples: [
                    { title: 'Lista Não-Ordenada', code: '<ul>\n  <li>Primeiro item</li>\n  <li>Segundo item</li>\n</ul>' },
                    { title: 'Lista Ordenada', code: '<ol>\n  <li>Passo 1</li>\n  <li>Passo 2</li>\n</ol>' }
                ]
            },
            {
                name: 'img',
                type: 'Inline',
                description: 'Insere uma imagem. Tag sem fechamento. Alt text é obrigatório para acessibilidade.',
                attributes: [
                    { name: 'src', type: 'URL', desc: 'Caminho da imagem (obrigatório)' },
                    { name: 'alt', type: 'string', desc: 'Texto alternativo (obrigatório)' },
                    { name: 'width', type: 'number', desc: 'Largura em pixels' },
                    { name: 'height', type: 'number', desc: 'Altura em pixels' },
                    { name: 'loading', type: 'string', desc: 'lazy para lazy loading' }
                ],
                examples: [
                    { title: 'Imagem Básica', code: '<img src="foto.jpg" alt="Descrição da foto">' },
                    { title: 'Com Dimensões', code: '<img src="foto.jpg" alt="Foto" width="400" height="300">' },
                    { title: 'Lazy Loading', code: '<img src="foto.jpg" alt="Foto" loading="lazy">' }
                ]
            },
            {
                name: 'input',
                type: 'Inline',
                description: 'Elemento de entrada de dados. Tag sem fechamento. Múltiplos tipos.',
                attributes: [
                    { name: 'type', type: 'string', desc: 'text, email, password, number, date, checkbox, radio, file, etc' },

        // Render functions
        function renderHTMLTags() {
            const container = document.getElementById('htmlContent');
            const sorted = [...htmlTags].sort((a, b) => a.name.localeCompare(b.name));
            
            container.innerHTML = sorted.map(tag => `
                <div class="property-card" id="html-${tag.name}">
                    <div class="property-name">&lt;${tag.name}&gt;</div>
                    <span class="property-type">${tag.type}</span>
                    <div class="property-description">${tag.description}</div>
                    
                    ${tag.attributes && tag.attributes.length ? `
                        <div class="subsection">
                            <div class="subsection-title">Atributos</div>
                            <table class="params-table">
                                <thead>
                                    <tr>
                                        <th>Atributo</th>
                                        <th>Tipo</th>
                                        <th>Descrição</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tag.attributes.map(attr => `
                                        <tr>
                                            <td class="param-name">${attr.name}</td>
                                            <td class="param-type">${attr.type}</td>
                                            <td>${attr.desc}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : ''}
                    
                    ${tag.examples && tag.examples.length ? `
                        <div class="subsection">
                            <div class="subsection-title">Exemplos</div>
                            ${tag.examples.map(ex => `
                                <div class="example-title">${ex.title}</div>
                                <div class="code-wrap">
                                    <div class="code-header">
                                        <span><span class="code-header-dot dot-red"></span><span class="code-header-dot dot-yellow"></span><span class="code-header-dot dot-green"></span>HTML</span>
                                        <button class="code-copy-btn" onclick="copyCode(event)">copiar</button>
                                    </div>
                                    <div class="code-block">${ex.code}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function updateSidebar(page) {
            const sidebarSection = document.getElementById('sidebarSection');
            
            if(page === 'html') {
                const sorted = [...htmlTags].sort((a, b) => a.name.localeCompare(b.name));
                sidebarSection.innerHTML = `
                    <div class="nav-section-title">HTML Tags</div>
                    ${sorted.map(tag => `
                        <div class="nav-item" onclick="scrollToId('html-${tag.name}')">
                            <span class="nav-item-tag">&lt;${tag.name}&gt;</span>
                        </div>
                    `).join('')}
                `;
            } else {
                const sorted = [...cssProperties].sort((a, b) => a.name.localeCompare(b.name));
                sidebarSection.innerHTML = `
                    <div class="nav-section-title">CSS Properties</div>
                    ${sorted.map(prop => `
                        <div class="nav-item" onclick="scrollToId('css-${prop.name}')">
                            <span class="nav-item-tag">${prop.name}</span>
                        </div>
                    `).join('')}
                `;
            }
        }

        function switchPage(page) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            
            document.getElementById('htmlBtn').classList.remove('active');
            document.getElementById('cssBtn').classList.remove('active');
            
            if(page === 'html') {
                document.getElementById('htmlBtn').classList.add('active');
            } else {
                document.getElementById('cssBtn').classList.add('active');
            }
            
            updateSidebar(page);
            document.getElementById('sidebar').classList.remove('open');
        }

        function scrollToId(id) {
            const el = document.getElementById(id);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function copyCode(e) {
            const btn = e.target;
            const code = btn.nextElementSibling.textContent;
            navigator.clipboard.writeText(code);
            const original = btn.textContent;
            btn.textContent = 'Copiado!';
            setTimeout(() => btn.textContent = original, 2000);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.property-card');
            
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        });

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Initialize
        renderHTMLTags();
        renderCSSProperties();
        updateSidebar('html');
        switchPage('html');
    </script>
</body>
</html>
